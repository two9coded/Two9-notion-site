<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediakit</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--bg2:#111;--card:#161616;--card2:#1d1d1d;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.24);
  --text:#ebebeb;--muted:#666;--dim:#333;
  --mono:ui-monospace,'Cascadia Code','SF Mono',SFMono-Regular,Menlo,Consolas,'Courier New',monospace;
  --serif:Georgia,'Times New Roman',serif;--r:8px;--r2:12px;
  --accent:#a78bfa;
}
body.light{
  --bg:#0a0a1a;--bg2:#1a1a1a;--card:#fff;--card2:#f5f2eb;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--border3:rgba(0,0,0,0.25);
  --text:#111;--muted:#888;--dim:#ccc;
}
html{}
body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh}

/* ── topbar ── */
.topbar{position:fixed;top:14px;left:0;right:0;z-index:400;display:flex;align-items:center;justify-content:space-between;padding:0 14px;pointer-events:none}
.topbar-left{display:flex;align-items:center;gap:6px;pointer-events:all}
.topbar-right{display:flex;align-items:center;gap:6px;pointer-events:all}
.tbtn{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:7px 13px;border-radius:5px;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text);transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.tbtn:hover{border-color:var(--border3);background:var(--card2)}

/* Two9 brand button — same size as other topbar buttons */
.tbtn.brand{background:var(--card);color:var(--text);border:1px solid var(--border2);font-size:9px;letter-spacing:.1em;font-weight:400;padding:7px 13px}
.tbtn.brand:hover{border-color:var(--border3);background:var(--card2)}

.tbtn.xbtn{padding:7px 10px;background:var(--card);border:1px solid var(--border2)}
.tbtn.xbtn:hover{border-color:var(--border3);background:var(--card2)}
.tbtn.xbtn svg{width:13px;height:13px;fill:var(--text);display:block}

/* admin indicator pill */
.admin-pill{display:none;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.3);color:var(--accent);align-items:center;gap:5px}
.admin-pill.visible{display:inline-flex}
.admin-pill-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── admin bar (bottom, only in admin mode) ── */
.admin-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--card);border-top:1px solid var(--border2);padding:8px 16px;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.admin-bar.visible{display:flex}
.admin-bar-left{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.admin-bar-left span{font-size:11px}
.admin-bar-right{display:flex;gap:6px}
.abtn{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:5px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.abtn:hover{border-color:var(--border3);color:var(--text);background:var(--card2)}
.abtn.red:hover{color:#e24b4a;border-color:#e24b4a}

/* ── admin login page ── */
.admin-login-page{position:fixed;inset:0;background:var(--bg);z-index:9999;display:none;align-items:center;justify-content:center}
.admin-login-page.visible{display:flex}
.lock-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:36px 32px;width:340px;max-width:90vw;text-align:center}
.lock-star{font-size:28px;margin-bottom:16px;color:var(--muted)}
.lock-title{font-family:var(--serif);font-size:20px;font-weight:800;margin-bottom:6px}
.lock-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:22px}
.lock-inp{width:100%;font-family:var(--mono);font-size:12px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:10px 13px;border-radius:7px;outline:none;letter-spacing:.04em;text-align:center;margin-bottom:10px;transition:border .2s}
.lock-inp:focus{border-color:var(--border3)}
.lock-inp::placeholder{color:var(--dim)}
.lock-go{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;width:100%;padding:11px;border-radius:7px;border:none;background:var(--text);color:var(--bg);cursor:pointer;transition:opacity .15s;margin-bottom:10px}
.lock-go:hover{opacity:.8}
.lock-back{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid var(--border2);color:var(--muted);width:100%;padding:9px;border-radius:7px;cursor:pointer;transition:all .15s;text-decoration:none;display:block}
.lock-back:hover{border-color:var(--border3);color:var(--text)}
.lock-err{font-size:9px;color:#e24b4a;letter-spacing:.08em;margin-top:4px;min-height:14px}

/* ── banner ── */
.banner{position:relative;width:100%;height:260px;background:var(--bg2);overflow:hidden}
.banner.editable{cursor:pointer}
.banner img.bimg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
.banner.editable:hover img.bimg{transform:scale(1.03)}
.banner-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none}
.banner-empty .bstar{font-size:30px;opacity:.15}
.banner-empty p{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.banner-hover{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:0;transition:opacity .2s;pointer-events:none}
.banner.editable:hover .banner-hover{opacity:1}
.banner-hover span{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.7)}
.banner-hover .bstar2{font-size:20px;color:#fff;opacity:.8}

/* ── shell ── */
.shell{max-width:780px;margin:0 auto;padding:0 20px 90px}

/* ── identity ── */
.identity{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:28px;gap:0}
.id-top-row{display:flex;align-items:flex-end;justify-content:space-between;width:100%;margin-top:-50px;margin-bottom:18px}
.pfp{position:relative;width:100px;height:100px;flex-shrink:0}
.pfp.editable{cursor:pointer}
.pfp-inner{width:100%;height:100%;background:var(--card2);border:3px solid var(--bg);overflow:hidden}
.pfp-inner img{width:100%;height:100%;object-fit:cover;display:block}
.pfp-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:28px;font-weight:700;color:var(--muted)}
.pfp-lens{position:absolute;inset:3px;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.pfp.editable:hover .pfp-lens{opacity:1}
.pfp-lens span{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#fff}
.id-tag{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.id-name{font-family:var(--mono);font-size:clamp(26px,5vw,44px);font-weight:700;line-height:1.15;letter-spacing:-.01em;transition:opacity .15s;word-break:break-word}
.id-name.editable{cursor:pointer}.id-name.editable:hover{opacity:.6}
.id-right{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* ── quote ── */
.quote-block{display:flex;gap:0;margin-bottom:22px}
.quote-bar{width:2px;background:var(--muted);flex-shrink:0;margin-right:13px;border-radius:1px;opacity:.5}
.quote-text{font-size:13px;line-height:1.75;color:var(--muted);transition:opacity .15s;font-style:italic}
.quote-text.editable{cursor:pointer}.quote-text.editable:hover{opacity:.7}
.quote-text.ph{color:var(--dim)}

/* ── stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:40px;background:var(--border)}
.sbox{background:var(--card);padding:16px 14px;position:relative;transition:background .15s}
.sbox.editable{cursor:pointer}.sbox.editable:hover{background:var(--card2)}
.sval{font-family:var(--serif);font-size:26px;font-weight:800;line-height:1;letter-spacing:-.03em}
.skey{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.sedit{position:absolute;bottom:7px;right:9px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);opacity:0;transition:opacity .15s}
.sbox.editable:hover .sedit{opacity:1}

/* ── section card ── */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-top:16px;overflow:hidden;transition:opacity .3s}
.sec-card.hidden-section{display:none}
.sec-card.private-section{opacity:.5}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.sec-head-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sec-star{font-size:12px;color:var(--muted)}
.sec-title-wrap{display:flex;align-items:center;gap:6px}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text);background:none;border:none;font-family:var(--mono);outline:none;padding:0;cursor:default}
.sec-title.editable{cursor:text;border-bottom:1px dashed transparent;transition:border-color .2s}
.sec-title.editable:hover,.sec-title.editable:focus{border-color:var(--border3)}
.sec-title-edit-icon{font-size:9px;color:var(--dim);cursor:pointer;display:none;transition:color .15s}
.sec-title-edit-icon:hover{color:var(--muted)}
.admin-mode .sec-title-edit-icon{display:inline}
.sec-head-right{display:flex;gap:6px;align-items:center}
.sec-btn{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 11px;border-radius:5px;cursor:pointer;transition:all .15s;display:none}
.sec-btn:hover{border-color:var(--border3);color:var(--text);background:var(--card2)}
.admin-mode .sec-btn{display:inline-flex}
.sec-body{padding:18px}
.slabel{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:16px}
.slabel:first-child{margin-top:0}

/* visibility toggle button */
.vis-btn{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid var(--border2);color:var(--muted);padding:4px 9px;border-radius:4px;cursor:pointer;transition:all .15s;display:none;align-items:center;gap:4px;white-space:nowrap}
.admin-mode .vis-btn{display:inline-flex}
.vis-btn.is-private{border-color:rgba(234,179,8,0.35);color:rgba(234,179,8,0.8)}
.vis-btn.is-private:hover{border-color:rgba(234,179,8,0.6);color:rgb(234,179,8)}
.vis-btn:not(.is-private):hover{border-color:var(--border3);color:var(--text)}
.private-badge{display:none;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(234,179,8,0.7);background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.2);padding:2px 7px;border-radius:3px}
.admin-mode .private-badge.visible{display:inline-block}

/* ── photo grid ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.sgrid.wide{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.sgrid.tall{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
.simg{position:relative;background:var(--card2);border:1px solid var(--border);overflow:hidden;cursor:grab;user-select:none;transition:border-color .15s}
.simg:active{cursor:grabbing}
.simg.sq{aspect-ratio:1}.simg.wide{aspect-ratio:16/9}.simg.tall{aspect-ratio:9/16}
.simg img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;transition:transform .3s}
.simg:hover img{transform:scale(1.04)}
.simg.dragging{opacity:.3;border-color:var(--border3)}
.simg.drag-over{border-color:var(--text)}
.simg .ov{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:flex-end;padding:7px;opacity:0;transition:opacity .2s}
.simg:hover .ov{opacity:1}
.sdel{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:4px 8px;cursor:pointer;border-radius:3px;backdrop-filter:blur(6px);transition:background .15s;display:none}
.admin-mode .sdel{display:block}
.sdel:hover{background:rgba(200,50,50,.5)}
.simg .grip{position:absolute;top:6px;left:6px;display:flex;flex-direction:column;gap:2px;opacity:0;transition:opacity .15s}
.simg:hover .grip{opacity:1}
.grip span{display:block;width:12px;height:1.5px;background:rgba(255,255,255,.7);border-radius:1px}
.sadd{flex-direction:column;align-items:center;justify-content:center;gap:5px;border:1px dashed var(--border2);cursor:pointer;transition:all .2s;background:transparent;display:none}
.admin-mode .sadd{display:flex}
.sadd.sq{aspect-ratio:1}.sadd.wide{aspect-ratio:16/9}.sadd.tall{aspect-ratio:9/16}
.sadd:hover{border-color:var(--border3);background:var(--card2)}
.sadd .plus{font-size:18px;color:var(--dim);transition:color .2s}
.sadd:hover .plus{color:var(--text)}
.sadd p{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);transition:color .2s}
.sadd:hover p{color:var(--muted)}

/* ── arts items ── */
.arts-list{display:flex;flex-direction:column;gap:12px}
.art-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative;user-select:none}
.art-item.draggable{cursor:grab}.art-item.draggable:active{cursor:grabbing}
.art-item.dragging{opacity:.3}
.art-item.drag-over{border-color:var(--text)}
.art-item img{width:100%;max-height:320px;object-fit:cover;display:block;pointer-events:none}
.art-credit{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card)}
.art-credit-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.art-x-icon{flex-shrink:0;width:16px;height:16px;opacity:.5}
.art-x-icon svg{width:16px;height:16px;fill:var(--text)}
.art-name{font-size:10px;color:var(--muted);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.art-x-link{font-size:9px;color:var(--muted);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;transition:color .15s}
.art-x-link:hover{color:var(--text)}
.art-acts{display:flex;gap:4px;flex-shrink:0}
.art-del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:color .15s;display:none}
.admin-mode .art-del-btn{display:block}
.art-del-btn:hover{color:var(--text)}
.art-add-btn{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px dashed var(--border2);color:var(--muted);padding:8px 14px;border-radius:var(--r);cursor:pointer;width:100%;transition:all .15s;margin-top:8px;display:none}
.admin-mode .art-add-btn{display:block}
.art-add-btn:hover{border-color:var(--border3);color:var(--text);background:var(--card2)}

/* ── affiliate cards ── */
.aff-list{display:flex;flex-direction:column;gap:8px}
.aff-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.aff-card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.aff-name{font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aff-bio{font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
.aff-link{font-size:9px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aff-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px;border-radius:4px;transition:color .15s;flex-shrink:0;display:none}
.admin-mode .aff-del{display:block}
.aff-del:hover{color:var(--text)}
.aff-img-wrap{padding:12px 14px}
.aff-pfp{width:80px;height:80px;border-radius:50%;object-fit:cover;border:1px solid var(--border);display:block}
.aff-pfp.editable{cursor:pointer}
.aff-pfp-ph{width:80px;height:80px;border-radius:50%;background:var(--card);border:1px dashed var(--border2);align-items:center;justify-content:center;cursor:pointer;font-size:9px;color:var(--dim);text-align:center;font-family:var(--mono);letter-spacing:.04em;display:none}
.admin-mode .aff-pfp-ph{display:flex}
.aff-add-btn{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px dashed var(--border2);color:var(--muted);padding:8px 14px;border-radius:var(--r);cursor:pointer;width:100%;transition:all .15s;margin-top:4px;display:none}
.admin-mode .aff-add-btn{display:block}
.aff-add-btn:hover{border-color:var(--border3);color:var(--text);background:var(--card2)}

/* ── links ── */
.llist{display:flex;flex-direction:column;gap:5px}
.lrow{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);user-select:none;transition:border-color .15s,background .15s}
.lrow.draggable{cursor:grab}.lrow.draggable:active{cursor:grabbing}
.lrow:hover{background:var(--card);border-color:var(--border2)}
.lrow.dragging{opacity:.3}.lrow.drag-over{border-color:var(--text)}
.lgrip{display:none;grid-template-columns:1fr 1fr;gap:2px;flex-shrink:0;opacity:.25}
.admin-mode .lgrip{display:grid}
.lgrip span{display:block;width:2.5px;height:2.5px;background:var(--text);border-radius:50%}
.lfav{width:24px;height:24px;border-radius:4px;background:var(--card);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.lfav img{width:100%;height:100%;object-fit:cover}
.ltxt{flex:1;min-width:0}
.ltitle{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lurl{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.lacts{display:flex;gap:3px;flex-shrink:0}
.lact{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:4px;transition:color .15s;display:none;align-items:center}
.lact.open-link{display:flex}
.admin-mode .lact{display:flex}
.lact:hover{color:var(--text)}
.lact svg{width:13px;height:13px}
.ladd{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;display:none}
.admin-mode .ladd{display:flex}
.linp{font-family:var(--mono);font-size:11px;flex:1;min-width:100px;background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:6px;outline:none;letter-spacing:.02em;transition:border .2s}
.linp:focus{border-color:var(--border3)}
.linp::placeholder{color:var(--dim)}
.ladd-go{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;border-radius:6px;background:var(--text);color:var(--bg);border:none;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.ladd-go:hover{opacity:.8}
.empty-msg{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:center;padding:24px 0}

/* ── footer ── */
.footer{max-width:780px;margin:48px auto 0;padding:20px 20px 40px;border-top
